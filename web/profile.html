<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>我的修炼 · 计算机修行录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo"><span class="logo-dot"></span>修炼录</div>
    <div class="nav-links">
      <a href="index.html">主页</a>
      <a href="community.html">社区</a>
      <a href="leaderboard.html">排行</a>
      <a href="dms.html">私信</a>
      <a href="profile.html" class="active">我的</a>
      
      <a href="#" onclick="logout();return false" style="color:var(--text-muted);font-size:12px;margin-left:8px;">退出</a>
    </div>
  </nav>

  <div class="container">

    <div class="profile-header">
      <div class="profile-avatar profile-avatar-clickable" id="profileAvatar" onclick="document.getElementById('avatarFileInput').click()" title="点击更换头像">易</div>
      <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
      <div class="profile-info">
        <h2 id="userName"></h2>
        <div class="profile-title" id="userTitle"></div>
        <div class="profile-meta" id="profileMeta"></div>
        <div class="profile-level" id="userLevel"></div>
      </div>
      <button class="profile-edit-btn" id="btnEditProfile">✎ 编辑</button>
    </div>

    <div class="profile-edit-card" id="profileEditCard" style="display:none;">
      <h3>编辑资料</h3>
      <div class="edit-row">
        <label>头像</label>
        <button type="button" class="btn-upload-avatar" onclick="document.getElementById('avatarFileInput').click()">上传图片</button>
        <span style="font-size:12px;color:var(--text-muted);margin-left:8px;">点击上传，自动裁为正方形</span>
      </div>
      <div class="edit-row">
        <label>名字</label>
        <input type="text" id="editName" placeholder="你的名字">
      </div>
      <div class="edit-row">
        <label>性别</label>
        <select id="editGender">
          <option value="">不透露</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
      <div class="edit-row">
        <label>年龄</label>
        <input type="number" id="editAge" placeholder="年龄" min="1" max="120">
      </div>
      <div class="edit-row">
        <label>联系方式</label>
        <input type="text" id="editContact" placeholder="邮箱 / 微信 / QQ">
      </div>
      <div class="edit-actions">
        <button class="btn-save" id="btnSaveProfile">保存</button>
        <button class="btn-cancel" id="btnCancelProfile">取消</button>
      </div>
    </div>

    <div class="stats-section">
      <h3>修炼战力</h3>
      <div id="statsList"></div>
    </div>

    <div class="stats-section">
      <h3>专精方向</h3>
      <div class="badge-grid" id="specList"></div>
    </div>

    <h3>感悟</h3>
    <p class="page-sub">记录每一次成长</p>

    <div class="journal-editor" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:18px;box-shadow:var(--shadow);">
      <input type="text" id="journalTitle" placeholder="感悟标题，例如：我终于理解了递归" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:4px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);margin-bottom:8px;">
      <textarea id="journalBody" rows="4" placeholder="写写这次突破经历了什么、踩了什么坑、学到了什么……" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:4px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);resize:vertical;margin-bottom:8px;"></textarea>
      <button id="btnSaveJournal" style="padding:8px 20px;border:1px solid var(--seal);background:var(--seal);color:#fff;font-size:13px;cursor:pointer;border-radius:4px;font-family:inherit;">写下感悟</button>
      <span id="journalMsg" style="margin-left:12px;font-size:13px;color:var(--green);display:none;">已记录！</span>
    </div>

    <div id="journalList"></div>
  </div>

  <div class="footer">计算机修行录 · 记录每一次突破</div>

  <script src="js-v3/api.js"></script>
  <script src="js-v3/constants.js"></script>
  <script src="js-v3/store.js"></script>
  <script src="js-v3/social.js"></script>
  <script>
    (function() {
      // 安全 DOM 获取，避免微信等浏览器 null 报错
      function $_(id) { return document.getElementById(id); }

      // 初始化：从服务端拉数据后渲染
      initStore(function() {
        refreshProfileDisplay();
        renderStats();
        renderSpecs();
        refreshJournals();
      });

      // ===== 用户信息 =====
      function refreshProfileDisplay() {
        var avatarEl = $_('profileAvatar'); if (!avatarEl) return;
        var av = USER.avatar || USER.name.charAt(0);
        if (av.indexOf('data:image') === 0) {
          avatarEl.innerHTML = '<img src="' + av + '" alt="头像" class="avatar-img">';
          avatarEl.className = 'profile-avatar profile-avatar-clickable avatar-has-img';
        } else {
          avatarEl.textContent = av;
          avatarEl.className = 'profile-avatar profile-avatar-clickable';
        }
        var nm = $_('userName'); if (nm) nm.textContent = USER.name;

        var parts = [];
        if (USER.gender) parts.push(USER.gender);
        if (USER.age) parts.push(USER.age + '岁');
        if (USER.contact) parts.push('✉ ' + USER.contact);
        var meta = $_('profileMeta'); if (meta) meta.textContent = parts.join(' · ') || '完善个人资料';

        var ut = $_('userTitle'); if (ut) ut.textContent = USER.level === 0 ? '入门 · 还没有段位' : USER.title + ' · 第 ' + USER.level + ' 段';
        var ul = $_('userLevel'); if (ul) ul.textContent = '当前：' + LEVELS[USER.level].name;
      }

      // ===== 编辑资料 =====
      var btnEdit = $_('btnEditProfile');
      if (btnEdit) btnEdit.addEventListener('click', function() {
        var en = $_('editName'); if (en) en.value = USER.name;
        var eg = $_('editGender'); if (eg) eg.value = USER.gender || '';
        var ea = $_('editAge'); if (ea) ea.value = USER.age || '';
        var ec = $_('editContact'); if (ec) ec.value = USER.contact || '';
        var card = $_('profileEditCard'); if (card) card.style.display = '';
        this.style.display = 'none';
      });

      var btnSave = $_('btnSaveProfile');
      if (btnSave) btnSave.addEventListener('click', function() {
        var en = $_('editName'); if (en && en.value.trim()) USER.name = en.value.trim();
        var eg = $_('editGender'); if (eg) USER.gender = eg.value;
        var ea = $_('editAge'); if (ea) USER.age = ea.value;
        var ec = $_('editContact'); if (ec) USER.contact = ec.value.trim();

        api.updateProfile({
          name: USER.name, gender: USER.gender, age: USER.age, contact: USER.contact
        }).then(function(res) {
          if (res && res.user) {
            USER.name = res.user.name; USER.gender = res.user.gender;
            USER.age = res.user.age; USER.contact = res.user.contact;
          }
        }).catch(function() {}).then(function() {
          cacheSave(); refreshProfileDisplay();
        });

        var card = $_('profileEditCard'); if (card) card.style.display = 'none';
        var be = $_('btnEditProfile'); if (be) be.style.display = '';
      });

      var btnCancel = $_('btnCancelProfile');
      if (btnCancel) btnCancel.addEventListener('click', function() {
        var card = $_('profileEditCard'); if (card) card.style.display = 'none';
        var be = $_('btnEditProfile'); if (be) be.style.display = '';
      });

      // ===== 头像上传 =====
      var avInput = $_('avatarFileInput');
      if (avInput) avInput.addEventListener('change', function() {
        var file = this.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) { alert('图片不能超过 2MB'); return; }
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            var outSize = 256; canvas.width = outSize; canvas.height = outSize;
            var ctx = canvas.getContext('2d');
            var crop = Math.min(img.width, img.height);
            ctx.drawImage(img, (img.width-crop)/2, (img.height-crop)/2, crop, crop, 0, 0, outSize, outSize);
            USER.avatar = canvas.toDataURL('image/jpeg', 0.6);
            refreshProfileDisplay(); cacheSave();
            api.updateProfile({ avatar: USER.avatar }).catch(function() {});
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        this.value = '';
      });

      // ===== 属性 =====
      function renderStats() {
        var el = $_('statsList'); if (!el) return;
        var stats = USER.stats || {};
        var sn = { coding: '编程能力', project: '项目经验', theory: '理论知识', tools: '工具掌握' };
        var sc = { coding: 'fill-coding', project: 'fill-project', theory: 'fill-theory', tools: 'fill-tool' };
        el.innerHTML = '';
        Object.keys(stats).forEach(function(key) {
          var val = stats[key] || 0;
          el.innerHTML += '<div class="stat-item"><div class="stat-label">' + (sn[key]||key) + '</div><span class="stat-val" style="font-weight:600;font-size:16px;">' + formatPower(val) + '</span></div>';
        });
      }

      function renderSpecs() {
        var el = $_('specList');
        if (USER.specializations.length === 0) {
          el.innerHTML = '<p style="color:var(--text-dim);font-size:14px;">突破到更高段位后解锁专精方向。</p>';
        } else {
          el.innerHTML = USER.specializations.map(function(s) {
            return '<div class="badge-item ' + (s.unlocked?'unlocked':'locked') + '"><div class="badge-icon">' + s.icon + '</div><div class="badge-name">' + s.name + '</div></div>';
          }).join('');
        }
      }

      // ===== 感悟 =====
      var journalMsg = $_('journalMsg');
      function showJournalFeedback(text, isError) {
        if (!journalMsg) return;
        journalMsg.textContent = text;
        journalMsg.style.color = isError ? '#d97706' : '#16a34a';
        journalMsg.style.display = 'inline';
        setTimeout(function() { journalMsg.style.display = 'none'; }, 3000);
      }

      var btnJournal = $_('btnSaveJournal');
      if (btnJournal) btnJournal.addEventListener('click', function() {
        var titleEl = $_('journalTitle'), bodyEl = $_('journalBody');
        var title = titleEl ? titleEl.value.trim() : '';
        var body = bodyEl ? bodyEl.value.trim() : '';
        if (!title || !body) return;

        // 显示保存中
        this.disabled = true;
        this.textContent = '保存中...';
        showJournalFeedback('保存中...');

        api.addJournal({ title: title, body: body }).then(function(data) {
          if (data && data.id) {
            if (titleEl) titleEl.value = '';
            if (bodyEl) bodyEl.value = '';
            showJournalFeedback('✓ 已保存到云端');
            refreshJournals();
          } else {
            showJournalFeedback('⚠ 保存失败，请重试', true);
          }
        }).catch(function() {
          showJournalFeedback('⚠ 网络错误，感悟未保存', true);
        }).then(function() {
          var btn = $_('btnSaveJournal');
          if (btn) { btn.disabled = false; btn.textContent = '写下感悟'; }
        });
      });

      function deleteJournal(id) {
        api.deleteJournal(id).then(function() { refreshJournals(); })
          .catch(function() { showJournalFeedback('⚠ 删除失败', true); });
      }

      window.deleteJournal = deleteJournal;  // inline onclick 需要

      function refreshJournals() {
        var el = $_('journalList'); if (!el) return;
        api.getJournals().then(function(journals) {
          USER.journals = journals || [];
          if (!journals || journals.length === 0) {
            el.innerHTML = '<p style="color:var(--text-dim);font-size:14px;">还没有感悟，去写第一篇吧。</p>';
          } else {
            el.innerHTML = journals.map(function(e) {
              return '<div class="journal-entry"><div class="entry-header"><div class="entry-title">' + e.title + '</div><div style="display:flex;align-items:center;gap:8px;"><div class="entry-date">' + (e.date||'') + '</div><button class="journal-del-btn" onclick="deleteJournal(' + e.id + ')" title="删除">✕</button></div></div><div class="entry-body">' + e.body + '</div></div>';
            }).join('');
          }
        }).catch(function() {
          el.innerHTML = '<p style="color:var(--text-dim);font-size:14px;">加载失败，请检查网络。</p>';
        });
      }
    })();
  </script>
</body>
</html>
