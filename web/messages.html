<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>消息 · 计算机修行录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo"><span class="logo-dot"></span>修炼录</div>
    <div class="nav-links">
      <a href="index.html">主页</a>
      <a href="profile.html">我的</a>
      <a href="messages.html" class="active">消息</a>
      <a href="#" onclick="logout();return false" style="color:var(--text-muted);font-size:12px;margin-left:8px;">退出</a>
    </div>
  </nav>

  <div class="container">
    <h2 class="page-title">消息</h2>
    <p class="page-sub">修炼路上的动态与通知
      <button id="btnMarkAllRead" style="margin-left:12px;padding:4px 14px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:inherit;">全部已读</button>
    </p>

    <div id="msgList"></div>
  </div>

  <div class="footer">计算机修行录 · 记录每一次突破</div>

  <!-- 底部操作面板 -->
  <div class="action-sheet-overlay" id="actionSheetOverlay" onclick="closeActionSheet()">
    <div class="action-sheet" onclick="event.stopPropagation()">
      <div class="action-sheet-handle"></div>
      <div class="action-sheet-msg" id="actionSheetMsg"></div>
      <button class="action-sheet-btn" id="actionSheetPin">置顶</button>
      <button class="action-sheet-btn action-sheet-danger" id="actionSheetDelete">删除</button>
      <button class="action-sheet-cancel" onclick="closeActionSheet()">取消</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script>
    var _actionMsgId = null;

    function renderMessages() {
      var el = document.getElementById('msgList');
      if (!el) return;

      if (MESSAGES.length === 0) {
        el.innerHTML = '<p style="color:var(--text-dim);font-size:14px;">暂无消息。</p>';
        return;
      }

      var sorted = MESSAGES.slice().sort(function(a, b) {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return 0;
      });

      el.innerHTML = sorted.map(function(msg) {
        return '<div class="msg-item' + (msg.unread ? ' unread' : '') + (msg.pinned ? ' msg-pinned' : '') +
          '" onclick="openActionSheet(' + msg.id + ')">' +
          (msg.icon ? '<div class="msg-icon">' + msg.icon + '</div>' : '') +
          '<div class="msg-body">' +
          '<div class="msg-text">' + msg.text + '</div>' +
          '<div class="msg-time">' + (msg.time || '') + '</div>' +
          '</div>' +
          '<span class="msg-more">⋯</span>' +
          '</div>';
      }).join('');
    }

    function openActionSheet(msgId) {
      _actionMsgId = msgId;
      var msg = MESSAGES.find(function(m) { return m.id === msgId; });
      if (!msg) return;
      document.getElementById('actionSheetMsg').textContent = msg.text;
      document.getElementById('actionSheetPin').textContent = msg.pinned ? '取消置顶' : '置顶';
      document.getElementById('actionSheetOverlay').classList.add('show');
    }

    function closeActionSheet() {
      document.getElementById('actionSheetOverlay').classList.remove('show');
      _actionMsgId = null;
    }

    // 置顶/取消置顶
    document.getElementById('actionSheetPin').addEventListener('click', function() {
      if (_actionMsgId === null) return;
      var msg = MESSAGES.find(function(m) { return m.id === _actionMsgId; });
      if (!msg) return;
      api.updateMessage(_actionMsgId, {
        icon: msg.icon || '',
        text: msg.text,
        time: msg.time,
        unread: msg.unread,
        pinned: !msg.pinned
      }).then(function() {
        // 更新本地
        msg.pinned = !msg.pinned;
        cacheSave();
        closeActionSheet();
        renderMessages();
      });
    });

    // 删除消息
    document.getElementById('actionSheetDelete').addEventListener('click', function() {
      if (_actionMsgId === null) return;
      api.deleteMessage(_actionMsgId).then(function() {
        MESSAGES = MESSAGES.filter(function(m) { return m.id !== _actionMsgId; });
        cacheSave();
        closeActionSheet();
        renderMessages();
      });
    });

    // 全部已读
    document.getElementById('btnMarkAllRead').addEventListener('click', function() {
      api.markAllRead().then(function() {
        MESSAGES.forEach(function(m) { m.unread = false; });
        cacheSave();
        renderMessages();
      });
    });

    // 初始化
    initStore(function() {
      renderMessages();
    });
  </script>
</body>
</html>
