<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>修炼排行榜 · 计算机修行录</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

<nav class="navbar">
  <div class="logo"><span class="logo-dot"></span>修炼录</div>
  <div class="nav-links">
    <a href="index.html">主页</a>
    <a href="community.html">社区</a>
    <a href="leaderboard.html" class="active">排行</a>
    <a href="dms.html">私信</a>
    <a href="profile.html">我的</a>
    <a href="#" onclick="logout();return false" style="color:var(--text-muted);font-size:12px;margin-left:8px;">退出</a>
  </div>
</nav>

<div class="container">
  <div class="page-title">修炼排行榜</div>
  <p class="page-sub">天下修士，谁与争锋</p>

  <!-- Top 3 -->
  <div id="top3" style="display:flex;gap:12px;justify-content:center;margin:24px 0;"></div>

  <!-- 全量列表 -->
  <div id="rankList"></div>
</div>

<script src="js-v3/api.js"></script>
<script src="js-v3/constants.js"></script>
<script src="js-v3/store.js"></script>
<script src="js-v3/social.js"></script>
<script>
var MEDALS = ['🥇', '🥈', '🥉'];
var LEVEL_COLORS = ['#6b6558','#57534e','#78716c','#575e6e','#4e6e5e','#8b7500','#b85c12','#c0392b','#8b1a1a','#1c1917'];

// 头像渲染：支持 base64 图片 或 文字首字
function avatarHtml(entry, size) {
  var av = entry.avatar || '';
  var s = size || 36;
  if (av.startsWith('data:image/')) {
    return '<img src="' + av + '" width="' + s + '" height="' + s + '" style="border-radius:50%;object-fit:cover;flex-shrink:0;vertical-align:middle;" alt="">';
  }
  var ch = (av || entry.name || entry.username || '?')[0];
  return '<span style="display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;width:' + s + 'px;height:' + s + 'px;border-radius:50%;background:' + LEVEL_COLORS[Math.min(entry.level, 9)] + ';color:#fff;font-size:' + Math.round(s*0.42) + 'px;">' + escapeHtml(ch) + '</span>';
}

function loadBoard() {
  api.getLeaderboard().then(function(data) {
    var board = data.leaderboard || [];
    if (!board.length) {
      document.getElementById('rankList').innerHTML = '<p style="text-align:center;color:var(--text-dim);padding:40px;">暂无数据</p>';
      return;
    }

    // Top 3 特写 - 领奖台布局：银(left) 金(center) 铜(right)
    var top3 = board.slice(0, 3);
    var top3html = '';
    var podiumOrder = [1, 0, 2]; // 银 金 铜 排列：top3[1]=rank2左, top3[0]=rank1中, top3[2]=rank3右
    podiumOrder.forEach(function(idx) {
      var entry = top3[idx];
      var pos = idx; // 0=金(top-1), 1=银(top-2), 2=铜(top-3)
      var size = pos === 0 ? 60 : 48; // 金牌位头像更大
      top3html += '<div class="top-card top-' + (pos + 1) + '" onclick="location.href=\'user.html?id=' + entry.id + '\'">'
        + '<div class="top-medal">' + MEDALS[pos] + '</div>'
        + '<div class="top-avatar">' + avatarHtml(entry, size) + '</div>'
        + '<div class="top-name">' + escapeHtml(entry.name || entry.username) + '</div>'
        + '<div class="top-level">' + escapeHtml(entry.title) + ' · ' + levelName(entry.level) + '</div>'
        + '<div class="top-stats">' + formatPower(entry.totalStats) + ' 战力</div>'
        + '</div>';
    });
    document.getElementById('top3').innerHTML = top3html;

    // 全量列表
    var listHtml = '';
    board.forEach(function(entry) {
      var medalHtml = entry.rank <= 3 ? ' <span style="font-size:18px;">' + MEDALS[entry.rank - 1] + '</span>' : '';
      listHtml += '<div class="lb-row" onclick="location.href=\'user.html?id=' + entry.id + '\'">'
        + '<span class="lb-rank">#' + entry.rank + medalHtml + '</span>'
        + '<span class="lb-avatar">' + avatarHtml(entry, 36) + '</span>'
        + '<div class="lb-info">'
        + '<span class="lb-name">' + escapeHtml(entry.name || entry.username) + '</span>'
        + '<span class="lb-title">' + escapeHtml(entry.title) + '</span>'
        + '</div>'
        + '<span class="lb-level">' + levelName(entry.level) + '</span>'
        + '<span class="lb-stats">' + formatPower(entry.totalStats) + ' 战力</span>'
        + '</div>';
    });
    document.getElementById('rankList').innerHTML = listHtml;
  }).catch(function() {
    document.getElementById('rankList').innerHTML = '<p style="color:var(--seal);text-align:center;padding:40px;">加载失败</p>';
  });
}

initStore(function() { loadBoard(); });
</script>
</body>
</html>
