<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>计算机修行录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo"><span class="logo-dot"></span>修炼录</div>
    <div class="nav-links">
      <a href="index.html" class="active">主页</a>
      <a href="community.html">社区</a>
      <a href="leaderboard.html">排行</a>
      <a href="dms.html">私信</a>
      <a href="messages.html" class="nav-badge" id="navMsgLink">消息</a>
      <a href="profile.html">我的</a>
      <span class="nav-settings" onclick="openSettings()" title="设置">⚙</span>
    </div>
  </nav>

  <section class="hero">
    <h1>计算机修行录</h1>
  </section>

  <div class="container">
    <div class="current-progress" id="currentProgress"></div>

    <h2 class="page-title">修炼九段</h2>
    <p class="page-sub">悬停查看能力要求 · 点击查看进阶条件</p>
    <div id="levelList"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" style="position:relative">
      <button class="modal-close" id="modalClose">&times;</button>

      <div id="modalInfo">
        <div class="modal-header">
          <div class="modal-badge" id="modalBadge"></div>
          <div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-tagline" id="modalPoem"></div>
          </div>
        </div>
        <div class="modal-section"><h4>修炼关卡</h4><ul class="modal-tasks" id="modalTasks"></ul></div>
        <div class="modal-section"><h4>考核</h4><p id="modalExam"></p></div>
        <div class="modal-section"><h4>修炼资源</h4><div id="modalResources"></div></div>
        <div class="modal-section"><h4>进阶条件</h4><p id="modalRequire"></p></div>
        <div class="modal-section"><h4>达到此境界</h4><p id="modalDesc"></p></div>
        <button class="btn-quiz" id="btnStartQuiz">开始考核</button>
      </div>

      <div id="modalQuiz" style="display:none">
        <div class="modal-header">
          <div class="modal-badge" id="quizBadge"></div>
          <div>
            <div class="modal-title" id="quizTitle"></div>
            <div class="modal-tagline">考核</div>
          </div>
        </div>
        <div id="quizQuestions"></div>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button class="btn-quiz" id="btnSubmitQuiz">提交</button>
          <button class="btn-back" id="btnBackQuiz">← 返回</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 突破成功动效 -->
  <div class="breakthrough-overlay" id="breakthroughOverlay">
    <div class="breakthrough-content">
      <div class="breakthrough-glow"></div>
      <div class="breakthrough-title">突破成功</div>
      <div class="breakthrough-level" id="breakthroughLevel"></div>
      <div class="breakthrough-poem" id="breakthroughPoem"></div>
    </div>
  </div>

  <!-- 关卡验证弹窗 -->
  <div class="task-confirm-overlay" id="taskCheckOverlay" onclick="closeTaskCheck()">
    <div class="task-confirm-card" onclick="event.stopPropagation()">
      <div class="task-confirm-title">关卡验证</div>
      <div class="task-confirm-text" id="taskCheckTask"></div>
      <div class="task-check-q" id="taskCheckQuestion"></div>
      <div class="task-check-opts" id="taskCheckOpts"></div>
      <div class="task-check-feedback" id="taskCheckFeedback" style="display:none"></div>
      <div class="task-confirm-actions">
        <button class="btn-save" id="btnSubmitCheck" onclick="submitTaskCheck()">提交</button>
        <button class="btn-cancel" onclick="closeTaskCheck()">关闭</button>
      </div>
    </div>
  </div>

  <div class="footer">计算机修行录 · 记录每一次突破</div>

  <script src="js-v3/api.js"></script>
  <script src="js-v3/constants.js"></script>
  <script src="js-v3/store.js"></script>
  <script src="js-v3/app.js"></script>
  <script src="js-v3/nav.js"></script>
  <script>
    // 页面初始化：先同步服务端数据，再渲染
    initStore(function() {
      refreshProgress();
      renderLevelList();
      bindModalEvents();
    });

    // 弹窗打开时设置当前 context（供考核使用）
    var _origOpenModal = openModal;
    openModal = function(idx) {
      window._currentQuiz = { level: LEVELS[idx], idx: idx };
      _origOpenModal(idx);
    };
  </script>
</body>
</html>
